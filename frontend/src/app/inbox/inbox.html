<mat-sidenav-container class="shell" [hasBackdrop]="drawerMode() === 'over'">
  <mat-sidenav
    class="drawer"
    [mode]="drawerMode()"
    [opened]="drawerOpen()"
    (closedStart)="drawerOpen.set(false)"
  >
    <app-conversation-list
      [conversations]="conversations()"
      [selectedId]="selectedId()"
      (select)="onSelect($event)"
    />
  </mat-sidenav>

  <mat-sidenav-content class="content">
    <main class="panes">
      <section class="pane pane-thread" aria-label="Conversation">
        @if (drawerMode() === 'over') {
          <button matButton class="drawer-toggle" (click)="drawerOpen.set(true)">
            &#9776; Inbox
          </button>
        }
        <app-conversation-thread [items]="thread()" [justSentId]="justSentId()" />
      </section>

      <app-reply-workspace [message]="selected()" (replied)="onReplied($event)" />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
