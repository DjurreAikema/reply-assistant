<mat-toolbar class="topbar">
  <span class="brand">Reply Assistant</span>
  <span class="tagline">Package delivery support</span>
</mat-toolbar>

<main class="panes">
  <section class="pane pane-list" aria-label="Inbox">
    <app-message-list
      [messages]="messages()"
      [selectedId]="selected()?.id ?? null"
      (select)="onSelect($event)"
    />
  </section>

  <section class="pane pane-detail" aria-label="Selected email">
    <app-message-detail [message]="selected()" />
  </section>

  <section class="pane pane-ai" aria-label="AI reply suggestions">
    <app-ai-panel [message]="selected()" (replied)="onReplied($event)" />
  </section>
</main>
