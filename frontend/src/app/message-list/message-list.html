@if (messages(); as list) {
  <div class="list" role="listbox" aria-label="Inbox">
    @for (msg of list; track msg.id) {
      <button
        matRipple
        class="row"
        role="option"
        [class.selected]="msg.id === selectedId()"
        [class.unread]="!msg.isRead && !msg.isReplied"
        [class.replied]="msg.isReplied"
        [attr.aria-selected]="msg.id === selectedId()"
        (click)="select.emit(msg)"
      >
        <span class="dot" aria-hidden="true"></span>
        <span class="content">
          <span class="top">
            <span class="sender">{{ msg.from.emailAddress.name }}</span>
            <span class="date">{{ msg.receivedDateTime | date: 'd MMM' }}</span>
          </span>
          <span class="subject">{{ msg.subject }}</span>
          <span class="preview">{{ msg.bodyPreview }}</span>
        </span>
        @if (msg.isReplied) {
          <span class="replied-badge">Replied</span>
        }
      </button>
    }
  </div>
} @else {
  <!-- Skeletons keep the pane shaped like the data it is waiting for. -->
  <div class="list" aria-hidden="true">
    @for (i of [1, 2, 3, 4, 5, 6]; track i) {
      <div class="row skeleton-row">
        <span class="skeleton line w40"></span>
        <span class="skeleton line w80"></span>
        <span class="skeleton line w60"></span>
      </div>
    }
  </div>
}
